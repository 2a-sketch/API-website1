            theme: {
                extend: {
                    colors: {
                        charcoal: '#1a1a1a','charcoal-light': '#2a2a2a','charcoal-lighter': '#3a3a3a',
                        cream: '#F5F1E8','cream-dark': '#E8E0D0',

                        silver: '#8D99AE','silver-light': '#B0B8C8','silver-dark': '#6B7A8D',

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
        body{font-family:'Inter',sans-serif;background:#1a1a1a;color:#F5F1E8;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#1a1a1a}::-webkit-scrollbar-thumb{background:#D62828;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#E85D04}
        @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .gradient-text{background:linear-gradient(135deg,#D62828,#E85D04,#D62828);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 3s ease infinite}
        .hero-gradient{background:radial-gradient(ellipse at 30% 50%,rgba(214,40,40,0.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(232,93,4,0.1) 0%,transparent 60%),#1a1a1a}
        .card-gradient{background:linear-gradient(145deg,#2a2a2a 0%,#1a1a1a 100%)}
        .noise-overlay::before{content:'';position:absolute;inset:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
        input:focus,select:focus,textarea:focus{outline:none;border-color:#D62828 !important;box-shadow:0 0 0 3px rgba(214,40,40,0.2)}
        @keyframes scroll{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-50%,0,0)}}.testimonial-scroll{animation:scroll 30s linear infinite;will-change:transform}.testimonial-scroll:hover{animation-play-state:paused}
        section{transform:translateZ(0);backface-visibility:hidden}
        img{content-visibility:auto;transform:translateZ(0)}
        video{transform:translateZ(0)}
        @media (max-width: 768px) {
            .noise-overlay::before{display:none !important}
            .blur-3xl{display:none !important}
            *{-webkit-tap-highlight-color:transparent}
            .testimonial-scroll{animation-duration:40s}
            video{object-fit:cover}
            .gradient-text{animation:none;background:linear-gradient(135deg,#D62828,#E85D04);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
            .card-gradient{will-change:auto}
            section{will-change:auto}
        }
        @media (prefers-reduced-motion: reduce) {
            *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important}
        }
    </style>
